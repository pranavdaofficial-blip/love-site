<!DOCTYPE html>
<html>
<head>
    <title>Pannu ❤️ Chaaru</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            background: black;
            color: white;
            text-align: center;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }

        h1 {
            margin-top: 40px;
            font-size: 30px;
        }

        /* Main image */
        .main-img {
            width: 280px;
            border-radius: 20px;
            margin-top: 20px;
            box-shadow: 0 0 20px pink;
        }

        .content {
            margin-top: 20px;
            font-size: 18px;
            padding: 0 20px;
        }

        button {
            margin-top: 25px;
            padding: 12px 25px;
            border: none;
            border-radius: 10px;
            background: pink;
            color: black;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: hotpink;
        }

        /* Floating images */
        .floating-img {
            position: fixed;
            bottom: -100px;
            border-radius: 10px;
            animation: floatUp 6s linear infinite;
            z-index: 0;
            opacity: 0.8;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(0);
                opacity: 1;
            }
            100% {
                transform: translateY(-110vh);
                opacity: 0;
            }
        }

        /* Keep content above background */
        body > * {
            position: relative;
            z-index: 1;
        }
    </style>
</head>

<body>

    <h1>Pannu ❤️ Chaaru</h1>

    <!-- Main Image -->
    <img class="main-img" src="image.jpg" alt="Love Image">

    <div class="content" id="text">
        You are the most special person in my life ❤️ <br>
        This page is just for you 💖
    </div>

    <button onclick="changeText()">Click Me 💌</button>

    <script>
        function changeText() {
            document.getElementById("text").innerHTML =
                "I Love You So Much ❤️ Forever & Always 💞";
        }

        // 👇 Images from folder
        const images = [
            "image.jpg",
            "image.jpg",
            "image.jpg"
        ];

        function createFloatingImage() {
            const img = document.createElement("img");
            img.classList.add("floating-img");

            // Random image
            img.src = images[Math.floor(Math.random() * images.length)];

            // Random position
            img.style.left = Math.random() * 100 + "vw";

            // Random size
            img.style.width = (50 + Math.random() * 60) + "px";

            document.body.appendChild(img);

            setTimeout(() => {
                img.remove();
            }, 6000);
        }

        setInterval(createFloatingImage, 500);
    </script>

</body>
</html>
